services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag_faq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: faq
      POSTGRES_PASSWORD: faq
      POSTGRES_DB: faq
    # Published so the bot can also run on the host (README's "Run locally" flow).
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faq -d faq"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    container_name: rag_faq_bot
    restart: unless-stopped
    # BOT_TOKEN, ADMIN_IDS, OPENAI_API_KEY (and optional OPENAI_BASE_URL) come from .env
    env_file: .env
    # Inside the compose network the database host is the `postgres` service, not localhost.
    environment:
      DB_URL: postgresql+asyncpg://faq:faq@postgres:5432/faq
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
